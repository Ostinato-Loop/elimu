kind = "web"
previewPath = "/"
title = "RALD ELIMU — Education OS"
version = "1.0.0"
id = "artifacts/elimu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26108

[services.development]
run = "pnpm --filter @workspace/elimu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elimu", "run", "build" ]
publicDir = "artifacts/elimu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26108"
BASE_PATH = "/"
