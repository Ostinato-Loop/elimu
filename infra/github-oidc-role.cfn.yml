AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitHub Actions OIDC identity provider + IAM role for RALD ELIMU deployments.
  Grants keyless push-to-ECR and ECS deploy access scoped to the main branch
  of Ostinato-Loop/elimu only. No static AWS keys are needed after this.

Parameters:
  GitHubOrg:
    Type: String
    Default: Ostinato-Loop
  GitHubRepo:
    Type: String
    Default: elimu
  EcrRepositoryName:
    Type: String
    Default: elimu-api
  EcsClusterArn:
    Type: String
    Description: ARN of the ECS cluster (rald-elimu-cluster)
  EcsServiceArn:
    Type: String
    Description: ARN of the ECS service (elimu-api-service)
  EcsTaskExecutionRoleArn:
    Type: String
    Description: ARN of the ECS task execution role (for iam:PassRole)
  EcsTaskRoleArn:
    Type: String
    Description: ARN of the ECS task role (for iam:PassRole)

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-elimu-deploy
      Description: Assumed by GitHub Actions OIDC for ELIMU ECR+ECS deployments (main branch only)
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOidcProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/master
      Policies:
        - PolicyName: ECRPush
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ECRAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: ECRPushImage
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !Sub arn:aws:ecr:eu-west-1:${AWS::AccountId}:repository/${EcrRepositoryName}

        - PolicyName: ECSDeploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: RegisterAndDescribeTaskDef
                Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                Resource: "*"
              - Sid: UpdateService
                Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                Resource:
                  - !Ref EcsClusterArn
                  - !Ref EcsServiceArn
              - Sid: PassRoleToECS
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Ref EcsTaskExecutionRoleArn
                  - !Ref EcsTaskRoleArn

Outputs:
  DeployRoleArn:
    Description: >
      Paste this ARN as the AWS_DEPLOY_ROLE_ARN secret in GitHub
      (Settings → Secrets and variables → Actions).
    Value: !GetAtt GitHubDeployRole.Arn
  OidcProviderArn:
    Value: !GetAtt GitHubOidcProvider.Arn
