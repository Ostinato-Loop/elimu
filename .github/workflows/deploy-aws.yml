name: Deploy — AWS ECS (elimu.rald.cloud)

on:
  push:
    branches: [main, master]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: elimu-api
  ECS_SERVICE: elimu-api-service
  ECS_CLUSTER: rald-elimu-cluster
  CONTAINER_NAME: elimu-api

jobs:
  deploy:
    name: Build → ECR → ECS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install dependencies & codegen
        run: |
          pnpm install --no-frozen-lockfile
          pnpm --filter @workspace/api-spec run codegen || true

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition elimu-api \
            --query taskDefinition \
            > infra/task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Health check
        run: |
          sleep 15
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://elimu.rald.cloud/api/healthz || echo "000")
          echo "elimu.rald.cloud/api/healthz → HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ ELIMU API healthy"
          else
            echo "⚠ ELIMU API not yet reachable (DNS propagation may take a moment)"
          fi
        continue-on-error: true
