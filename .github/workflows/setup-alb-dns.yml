name: Setup — ALB + DNS for api.elimu.rald.cloud

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  ECS_CLUSTER: rald-elimu-cluster
  ECS_SERVICE: elimu-api-service
  CONTAINER_NAME: elimu-api
  CONTAINER_PORT: "5000"
  ALB_NAME: elimu-api-alb
  TG_NAME: elimu-api-tg
  SG_NAME: elimu-api-sg
  SUBDOMAIN: api
  DOMAIN: rald.cloud
  FQDN: api.elimu.rald.cloud

jobs:
  alb-dns:
    name: Create ALB → ECS + Cloudflare DNS
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 1. Get VPC/subnets/SGs ────────────────────────────────────────────
      - name: Get VPC and subnets
        id: vpc
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' --output text)
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=defaultForAz,Values=true" \
            --query 'Subnets[*].SubnetId' --output text | tr '\t' ',')
          echo "vpc_id=${VPC_ID}" >> $GITHUB_OUTPUT
          echo "subnet_ids=${SUBNET_IDS}" >> $GITHUB_OUTPUT
          echo "subnet_list=$(echo ${SUBNET_IDS} | tr ',' ' ')" >> $GITHUB_OUTPUT
          echo "✓ VPC: ${VPC_ID}"
          echo "✓ Subnets: ${SUBNET_IDS}"

      - name: Get or create ALB security group
        id: alb_sg
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=elimu-alb-sg" \
                      "Name=vpc-id,Values=${{ steps.vpc.outputs.vpc_id }}" \
            --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
          if [ -z "$SG_ID" ] || [ "$SG_ID" = "None" ]; then
            SG_ID=$(aws ec2 create-security-group \
              --group-name elimu-alb-sg \
              --description "ELIMU ALB inbound (HTTP/HTTPS)" \
              --vpc-id ${{ steps.vpc.outputs.vpc_id }} \
              --query 'GroupId' --output text)
            aws ec2 authorize-security-group-ingress \
              --group-id ${SG_ID} --protocol tcp --port 80  --cidr 0.0.0.0/0 || true
            aws ec2 authorize-security-group-ingress \
              --group-id ${SG_ID} --protocol tcp --port 443 --cidr 0.0.0.0/0 || true
            echo "✓ Created ALB SG: ${SG_ID}"
          else
            echo "✓ ALB SG exists: ${SG_ID}"
          fi
          echo "sg_id=${SG_ID}" >> $GITHUB_OUTPUT

      - name: Get ECS task security group
        id: task_sg
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${{ env.SG_NAME }}" \
                      "Name=vpc-id,Values=${{ steps.vpc.outputs.vpc_id }}" \
            --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
          echo "sg_id=${SG_ID}" >> $GITHUB_OUTPUT
          echo "✓ Task SG: ${SG_ID}"
          # Allow ALB SG to reach task port
          aws ec2 authorize-security-group-ingress \
            --group-id ${SG_ID} --protocol tcp --port ${{ env.CONTAINER_PORT }} \
            --source-group ${{ steps.alb_sg.outputs.sg_id }} 2>/dev/null || true

      # ── 2. Create ALB ─────────────────────────────────────────────────────
      - name: Create ALB (idempotent)
        id: alb
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "${{ env.ALB_NAME }}" \
            --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
          if [ -z "$ALB_ARN" ] || [ "$ALB_ARN" = "None" ]; then
            ALB_ARN=$(aws elbv2 create-load-balancer \
              --name "${{ env.ALB_NAME }}" \
              --subnets ${{ steps.vpc.outputs.subnet_list }} \
              --security-groups "${{ steps.alb_sg.outputs.sg_id }}" \
              --scheme internet-facing \
              --type application \
              --ip-address-type ipv4 \
              --query 'LoadBalancers[0].LoadBalancerArn' --output text)
            echo "✓ Created ALB"
          else
            echo "✓ ALB exists"
          fi
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --load-balancer-arns "${ALB_ARN}" \
            --query 'LoadBalancers[0].DNSName' --output text)
          echo "alb_arn=${ALB_ARN}" >> $GITHUB_OUTPUT
          echo "alb_dns=${ALB_DNS}" >> $GITHUB_OUTPUT
          echo "✓ ALB ARN: ${ALB_ARN}"
          echo "✓ ALB DNS: ${ALB_DNS}"

      # ── 3. Create target group ────────────────────────────────────────────
      - name: Create target group (idempotent)
        id: tg
        run: |
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "${{ env.TG_NAME }}" \
            --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
          if [ -z "$TG_ARN" ] || [ "$TG_ARN" = "None" ]; then
            TG_ARN=$(aws elbv2 create-target-group \
              --name "${{ env.TG_NAME }}" \
              --protocol HTTP \
              --port ${{ env.CONTAINER_PORT }} \
              --vpc-id "${{ steps.vpc.outputs.vpc_id }}" \
              --target-type ip \
              --health-check-protocol HTTP \
              --health-check-path /api/healthz \
              --health-check-interval-seconds 30 \
              --healthy-threshold-count 2 \
              --unhealthy-threshold-count 3 \
              --query 'TargetGroups[0].TargetGroupArn' --output text)
            echo "✓ Created target group"
          else
            echo "✓ Target group exists"
          fi
          echo "tg_arn=${TG_ARN}" >> $GITHUB_OUTPUT
          echo "✓ TG ARN: ${TG_ARN}"

      # ── 4. Create HTTP listener ───────────────────────────────────────────
      - name: Create HTTP listener on ALB
        run: |
          EXISTING=$(aws elbv2 describe-listeners \
            --load-balancer-arn "${{ steps.alb.outputs.alb_arn }}" \
            --query 'Listeners[?Port==`80`].ListenerArn' --output text 2>/dev/null || echo "")
          if [ -z "$EXISTING" ] || [ "$EXISTING" = "None" ]; then
            aws elbv2 create-listener \
              --load-balancer-arn "${{ steps.alb.outputs.alb_arn }}" \
              --protocol HTTP \
              --port 80 \
              --default-actions "Type=forward,TargetGroupArn=${{ steps.tg.outputs.tg_arn }}"
            echo "✓ Created HTTP listener :80"
          else
            echo "✓ HTTP listener exists"
          fi

      # ── 5. Get latest task definition ─────────────────────────────────────
      - name: Get latest task definition ARN
        id: task_def
        run: |
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition elimu-api \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=${TASK_DEF_ARN}" >> $GITHUB_OUTPUT
          echo "✓ Task def: ${TASK_DEF_ARN}"

      # ── 6. Recreate ECS service with ALB ──────────────────────────────────
      - name: Scale down and delete old service (if no LB attached)
        run: |
          SVC=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[0]' --output json 2>/dev/null || echo "{}")

          HAS_LB=$(echo "$SVC" | jq -r '.loadBalancers | length // 0')
          STATUS=$(echo "$SVC" | jq -r '.status // "NOTFOUND"')

          if [ "$STATUS" = "ACTIVE" ] && [ "$HAS_LB" = "0" ]; then
            echo "Service exists without LB — scaling down and force-deleting..."
            aws ecs update-service \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --service "${{ env.ECS_SERVICE }}" \
              --desired-count 0 || true
            sleep 5
            aws ecs delete-service \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --service "${{ env.ECS_SERVICE }}" \
              --force || true

            echo "Polling until service is INACTIVE (max 5 min)..."
            for i in $(seq 1 30); do
              CUR=$(aws ecs describe-services \
                --cluster "${{ env.ECS_CLUSTER }}" \
                --services "${{ env.ECS_SERVICE }}" \
                --query 'services[0].status' --output text 2>/dev/null || echo "NOTFOUND")
              echo "  [${i}/30] status=${CUR}"
              if [ "$CUR" = "INACTIVE" ] || [ "$CUR" = "NOTFOUND" ] || [ "$CUR" = "None" ]; then
                echo "✓ Service drained"
                break
              fi
              sleep 10
            done
          elif [ "$STATUS" = "ACTIVE" ] && [ "$HAS_LB" != "0" ]; then
            echo "✓ Service already has LB — no action needed"
          else
            echo "✓ Service does not exist — will create fresh"
          fi

      - name: Create ECS service with ALB
        run: |
          SVC_STATUS=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[?status==`ACTIVE`].serviceName' --output text 2>/dev/null || echo "")

          if [ -z "$SVC_STATUS" ] || [ "$SVC_STATUS" = "None" ]; then
            aws ecs create-service \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --service-name "${{ env.ECS_SERVICE }}" \
              --task-definition "${{ steps.task_def.outputs.task_def_arn }}" \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={
                subnets=[${{ steps.vpc.outputs.subnet_ids }}],
                securityGroups=[${{ steps.task_sg.outputs.sg_id }}],
                assignPublicIp=ENABLED
              }" \
              --load-balancers "[{
                \"targetGroupArn\": \"${{ steps.tg.outputs.tg_arn }}\",
                \"containerName\": \"${{ env.CONTAINER_NAME }}\",
                \"containerPort\": ${{ env.CONTAINER_PORT }}
              }]" \
              --health-check-grace-period-seconds 120
            echo "✓ Service created with ALB"
          else
            echo "✓ Service already active with LB"
          fi

      # ── 7. Wait for ALB to be active ──────────────────────────────────────
      - name: Wait for ALB to be active
        run: |
          echo "Waiting for ALB to become active..."
          for i in $(seq 1 12); do
            STATE=$(aws elbv2 describe-load-balancers \
              --load-balancer-arns "${{ steps.alb.outputs.alb_arn }}" \
              --query 'LoadBalancers[0].State.Code' --output text)
            echo "  ALB state: ${STATE}"
            [ "$STATE" = "active" ] && echo "✓ ALB active" && break
            sleep 10
          done

      # ── 8. Cloudflare DNS ─────────────────────────────────────────────────
      - name: Get Cloudflare Zone ID for rald.cloud
        id: cf_zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -sf \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones?name=${{ env.DOMAIN }}" \
            | jq -r '.result[0].id')
          echo "zone_id=${ZONE_ID}" >> $GITHUB_OUTPUT
          echo "✓ Cloudflare zone ID: ${ZONE_ID}"

      - name: Upsert CNAME api → ALB DNS in Cloudflare
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID="${{ steps.cf_zone.outputs.zone_id }}"
          ALB_DNS="${{ steps.alb.outputs.alb_dns }}"

          # Check if record exists
          RECORD_ID=$(curl -sf \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=CNAME&name=api.elimu.${{ env.DOMAIN }}" \
            | jq -r '.result[0].id // empty')

          if [ -n "$RECORD_ID" ]; then
            # Update existing
            curl -sf -X PUT \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" \
              -d "{\"type\":\"CNAME\",\"name\":\"api.elimu\",\"content\":\"${ALB_DNS}\",\"ttl\":1,\"proxied\":true}"
            echo "✓ Updated CNAME api.elimu → ${ALB_DNS}"
          else
            # Create new
            curl -sf -X POST \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -d "{\"type\":\"CNAME\",\"name\":\"api.elimu\",\"content\":\"${ALB_DNS}\",\"ttl\":1,\"proxied\":true}"
            echo "✓ Created CNAME api.elimu → ${ALB_DNS}"
          fi

      # ── 9. Summary ────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "══════════════════════════════════════════"
          echo "  ELIMU API infrastructure ready ✓"
          echo ""
          echo "  ALB DNS : ${{ steps.alb.outputs.alb_dns }}"
          echo "  Endpoint: https://${{ env.FQDN }}/api/healthz"
          echo ""
          echo "  DNS record created:"
          echo "  api.elimu.rald.cloud CNAME → ALB (Cloudflare proxied)"
          echo ""
          echo "  ECS service ${{ env.ECS_SERVICE }} running with ALB."
          echo "  The db-migrate workflow will run automatically"
          echo "  when the ECS deploy completes."
          echo "══════════════════════════════════════════"
