name: Bootstrap — Seed AWS Secrets Manager

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: 'PostgreSQL DATABASE_URL for production'
        required: true
        type: string
      issuer_url:
        description: 'OIDC Issuer URL'
        required: false
        default: 'https://auth.rald.cloud/oidc'
        type: string
      oidc_client_id:
        description: 'OIDC Client ID (from auth.rald.cloud)'
        required: true
        type: string

env:
  AWS_REGION: eu-west-1

jobs:
  seed:
    name: Update AWS Secrets Manager
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mask inputs
        run: |
          echo "::add-mask::${{ inputs.database_url }}"
          echo "::add-mask::${{ inputs.oidc_client_id }}"

      - name: Update elimu/DATABASE_URL
        run: |
          aws secretsmanager put-secret-value \
            --secret-id elimu/DATABASE_URL \
            --secret-string "${{ inputs.database_url }}"
          echo "✓ DATABASE_URL updated"

      - name: Update elimu/ISSUER_URL
        run: |
          aws secretsmanager put-secret-value \
            --secret-id elimu/ISSUER_URL \
            --secret-string "${{ inputs.issuer_url }}"
          echo "✓ ISSUER_URL updated → ${{ inputs.issuer_url }}"

      - name: Upsert elimu/OIDC_CLIENT_ID
        run: |
          aws secretsmanager describe-secret \
            --secret-id elimu/OIDC_CLIENT_ID \
            --region ${{ env.AWS_REGION }} 2>/dev/null \
          && aws secretsmanager put-secret-value \
            --secret-id elimu/OIDC_CLIENT_ID \
            --secret-string "${{ inputs.oidc_client_id }}" \
          || aws secretsmanager create-secret \
            --name elimu/OIDC_CLIENT_ID \
            --secret-string "${{ inputs.oidc_client_id }}"
          echo "✓ OIDC_CLIENT_ID updated"

      - name: Summary
        run: |
          echo "══════════════════════════════════════════"
          echo "  AWS Secrets Manager seeded for ELIMU"
          echo "  DATABASE_URL   ✓"
          echo "  ISSUER_URL     ✓  (${{ inputs.issuer_url }})"
          echo "  OIDC_CLIENT_ID ✓"
          echo ""
          echo "  Trigger deploy-aws.yml to pick up the new secrets."
          echo "══════════════════════════════════════════"
