name: Migrate — Rename REPL_ID secret to OIDC_CLIENT_ID

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1

jobs:
  rename:
    name: Copy elimu/REPL_ID → elimu/OIDC_CLIENT_ID then delete old
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Copy REPL_ID value to OIDC_CLIENT_ID
        run: |
          OLD=$(aws secretsmanager get-secret-value \
            --secret-id elimu/REPL_ID \
            --query SecretString --output text 2>/dev/null || echo "")
          echo "::add-mask::${OLD}"

          if [ -z "$OLD" ]; then
            echo "elimu/REPL_ID does not exist — nothing to migrate"
            exit 0
          fi

          # Create or update OIDC_CLIENT_ID
          aws secretsmanager describe-secret \
            --secret-id elimu/OIDC_CLIENT_ID 2>/dev/null \
          && aws secretsmanager put-secret-value \
            --secret-id elimu/OIDC_CLIENT_ID \
            --secret-string "${OLD}" \
          || aws secretsmanager create-secret \
            --name elimu/OIDC_CLIENT_ID \
            --description "ELIMU OIDC client ID for auth.rald.cloud" \
            --secret-string "${OLD}"

          echo "✓ elimu/OIDC_CLIENT_ID set"

      - name: Schedule old REPL_ID secret for deletion
        run: |
          aws secretsmanager delete-secret \
            --secret-id elimu/REPL_ID \
            --recovery-window-in-days 7 2>/dev/null \
          && echo "✓ elimu/REPL_ID scheduled for deletion (7-day recovery window)" \
          || echo "elimu/REPL_ID did not exist — nothing to delete"

      - name: Summary
        run: |
          echo "══════════════════════════════════════════"
          echo "  Secret migration complete"
          echo "  elimu/REPL_ID    → scheduled for deletion"
          echo "  elimu/OIDC_CLIENT_ID → active ✓"
          echo ""
          echo "  Next: trigger setup-alb-dns.yml or deploy-aws.yml"
          echo "══════════════════════════════════════════"
