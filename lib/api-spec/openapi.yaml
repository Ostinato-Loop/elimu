          nullable: true
        remarks:
          type: string
          nullable: true
        recordedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, assessmentId, studentId, score, createdAt]

    AssessmentResultListResponse:
      type: object
      properties:
        assessmentId:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentResult"
        averageScore:
          type: number
          nullable: true
        passRate:
          type: number
          nullable: true
      required: [assessmentId, results]

    ResultEntry:
      type: object
      properties:
        studentId:
          type: string
        score:
          type: number
        grade:
          type: string
        remarks:
          type: string
      required: [studentId, score]

    RecordResultsBody:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ResultEntry"
      required: [results]

    StudentResultsResponse:
      type: object
      properties:
        studentId:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentResult"
        gpa:
          type: number
          nullable: true
      required: [studentId, results]

    # ── Fee & Payment ───────────────────────────────────────────────────────
    FeeStructure:
      type: object
      properties:
        id:
          type: string
        schoolId:
          type: string
        name:
          type: string
        amount:
          type: number
        currency:
          type: string
        academicYear:
          type: string
        academicTerm:
          type: string
          nullable: true
        academicLevel:
          $ref: "#/components/schemas/AcademicLevel"
        dueDate:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, schoolId, name, amount, currency, academicYear, academicLevel, createdAt, updatedAt]

    FeeStructureListResponse:
      type: object
      properties:
        fees:
          type: array
          items:
            $ref: "#/components/schemas/FeeStructure"
        total:
          type: integer
      required: [fees, total]

    CreateFeeStructureBody:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
        currency:
          type: string
          default: NGN
        academicYear:
          type: string
        academicTerm:
          type: string
        academicLevel:
          $ref: "#/components/schemas/AcademicLevel"
        dueDate:
          type: string
          format: date
        description:
          type: string
      required: [name, amount, academicYear, academicLevel]

    Payment:
      type: object
      properties:
        id:
          type: string
        feeStructureId:
          type: string
        studentId:
          type: string
        studentName:
          type: string
          nullable: true
        amountPaid:
          type: number
        currency:
          type: string
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        reference:
          type: string
        status:
          $ref: "#/components/schemas/PaymentStatus"
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, feeStructureId, studentId, amountPaid, currency, paymentMethod, reference, status, createdAt]

    PaymentListResponse:
      type: object
      properties:
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        total:
          type: integer
        totalAmount:
          type: number
      required: [payments, total, totalAmount]

    RecordPaymentBody:
      type: object
      properties:
        feeStructureId:
          type: string
        studentId:
          type: string
        amountPaid:
          type: number
        currency:
          type: string
          default: NGN
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        reference:
          type: string
        status:
          $ref: "#/components/schemas/PaymentStatus"
        paidAt:
          type: string
          format: date-time
      required: [feeStructureId, studentId, amountPaid, paymentMethod]

    # ── Announcement ────────────────────────────────────────────────────────
    Announcement:
      type: object
      properties:
        id:
          type: string
        schoolId:
          type: string
        authorId:
          type: string
        authorName:
          type: string
          nullable: true
        title:
          type: string
        body:
          type: string
        audience:
          $ref: "#/components/schemas/AnnouncementAudience"
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, schoolId, authorId, title, body, audience, publishedAt, createdAt, updatedAt]

    AnnouncementListResponse:
      type: object
      properties:
        announcements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [announcements, total, page, limit]

    CreateAnnouncementBody:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        audience:
          $ref: "#/components/schemas/AnnouncementAudience"
        publishedAt:
          type: string
          format: date-time
      required: [title, body, audience]

    # ── Verification ────────────────────────────────────────────────────────
    Credential:
      type: object
      properties:
        id:
          type: string
        studentId:
          type: string
        studentName:
          type: string
          nullable: true
        schoolId:
          type: string
        schoolName:
          type: string
          nullable: true
        type:
          $ref: "#/components/schemas/CredentialType"
        title:
          type: string
        issuedAt:
          type: string
          format: date-time
        verificationHash:
          type: string
        verified:
          type: boolean
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, studentId, schoolId, type, title, issuedAt, verificationHash, verified, createdAt]

    CredentialListResponse:
      type: object
      properties:
        credentials:
          type: array
          items:
            $ref: "#/components/schemas/Credential"
        total:
          type: integer
      required: [credentials, total]

    IssueCredentialBody:
      type: object
      properties:
        studentId:
          type: string
        type:
          $ref: "#/components/schemas/CredentialType"
        title:
          type: string
        metadata:
          type: object
          additionalProperties: true
      required: [studentId, type, title]

    VerificationResult:
      type: object
      properties:
        verified:
          type: boolean
        credential:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/Credential"
            - type: "null"
        message:
          type: string
      required: [verified, credential, message]

    # ── Dashboard ────────────────────────────────────────────────────────────
    SchoolDashboard:
      type: object
      properties:
        schoolId:
          type: string
        school:
          $ref: "#/components/schemas/School"
        stats:
          type: object
          properties:
            totalStudents:
              type: integer
            totalStaff:
              type: integer
            totalClasses:
              type: integer
            totalParents:
              type: integer
            attendanceRateToday:
              type: number
              nullable: true
            outstandingFees:
              type: number
            recentPayments:
              type: integer
          required: [totalStudents, totalStaff, totalClasses, totalParents, outstandingFees, recentPayments]
        recentAnnouncements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        attendanceByClass:
          type: array
          items:
            type: object
            properties:
              classId:
                type: string
              className:
                type: string
              attendanceRate:
                type: number
              date:
                type: string
                format: date
            required: [classId, className, attendanceRate, date]
        recentPaymentsList:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
      required: [schoolId, school, stats, recentAnnouncements, attendanceByClass, recentPaymentsList]
